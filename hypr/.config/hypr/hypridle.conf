general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
}

listener{
    timeout = 1200                              # 20 min.
    on-timeout = bash -c '[ "$(cat /sys/class/power_supply/AC/online 2>/dev/null)" = "1" ] || loginctl lock-session'
}

listener {
    timeout = 600                                # 10 min.
    on-timeout = bash -c '[ "$(cat /sys/class/power_supply/AC/online 2>/dev/null)" = "1" ] || brightnessctl -s set 1'
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

listener {
    timeout = 900                                 # 15 min
    on-timeout = bash -c '[ "$(cat /sys/class/power_supply/AC/online 2>/dev/null)" = "1" ] || hyprctl dispatch dpms off'
    on-resume = hyprctl dispatch dpms on          # screen on when activity is detected after timeout has fired.
}

listener {
    timeout = 1200                                # 20min
    on-timeout = bash -c '[ "$(cat /sys/class/power_supply/AC/online 2>/dev/null)" = "1" ] || systemctl suspend'
}
